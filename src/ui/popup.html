<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>COR3 Helper</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <header class="app-header">
        <div class="app-title">COR3 <small>helper</small><span class="app-build-sep">|</span><span class="app-build" id="appBuild" title="Build commit"></span></div>
        <div class="header-actions">
            <select class="lang-select" id="langSelect" title="Language"></select>
            <button class="icon-btn" id="popOutBtn" title="Pop out">⧉</button>
            <button class="icon-btn" id="sidePanelBtn" title="Side panel">⊟</button>
        </div>
    </header>

    <!-- Version-mismatch banner. Hidden by default; shell.js reveals it
         when chrome.storage.local.webVersion ≠ EXPECTED_WEB_VERSION. -->
    <div class="version-warning" id="versionWarning" hidden></div>

    <!-- Wrapper around the navigable UI. shell.js swaps it out for a
         no-tab placeholder when no cor3.gg tab is open, so we keep
         everything that requires a live game tab inside it. -->
    <div id="appShell">
        <nav class="tabs" id="tabs"></nav>

        <main id="main">
            <section class="section" data-tab="overview"     id="section-overview"></section>
            <section class="section" data-tab="expeditions"  id="section-expeditions"></section>
            <section class="section" data-tab="autojobs"     id="section-autojobs"></section>
            <section class="section" data-tab="valuables"    id="section-valuables"></section>
            <section class="section" data-tab="modules"      id="section-modules"></section>
            <section class="section" data-tab="logs"         id="section-logs"></section>
        </main>
    </div>

    <!-- Placeholder when no cor3.gg tab is open. Toggled by shell.js. -->
    <div id="noTab" class="no-tab" hidden></div>

    <!-- Load order matches manifest content_scripts so the SAME globals are
         available. Popup is its own context but shares the COR3 namespace. -->
    <script src="../shared/platform.js"></script>
    <script src="../shared/constants.js"></script>
    <script src="../shared/build-info.js"></script>
    <script src="../shared/dom.js"></script>
    <script src="../core/bus.js"></script>
    <script src="../core/store.js"></script>
    <script src="../core/logger.js"></script>
    <script src="../shared/errors.js"></script>

    <script src="../shared/i18n.js"></script>
    <script src="../shared/i18n-bridge.js"></script>
    <script src="../shared/aj-eligibility.js"></script>
    <script src="../shared/aj-reachability.js"></script>
    <script src="../shared/exp-decision-score.js"></script>

    <script src="components/icons.js"></script>
    <script src="components/timer.js"></script>
    <script src="components/module-card.js"></script>
    <script src="components/log-viewer.js"></script>
    <script src="components/pan-zoom.js"></script>

    <script src="sections/overview.js"></script>
    <script src="sections/expeditions.js"></script>

    <!-- Auto Jobs section. log-export populates COR3.autoJobs.logExport;
         network-map populates COR3.uiComponents.networkMap. Load network-map
         before section.js so the attach API exists when the section mounts. -->
    <script src="sections/auto-jobs/log-export.js"></script>
    <script src="sections/auto-jobs/master-switches.js"></script>
    <script src="sections/auto-jobs/network-map.js"></script>
    <script src="sections/auto-jobs/job-list.js"></script>
    <script src="sections/auto-jobs/flow-map.js"></script>
    <script src="sections/auto-jobs/section.js"></script>

    <script src="sections/valuables.js"></script>
    <script src="sections/modules-panel.js"></script>
    <script src="sections/logs-panel.js"></script>

    <script src="shell.js"></script>
</body>
</html>
